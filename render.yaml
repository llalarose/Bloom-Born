services:
  - type: web
    name: bloom-bond
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 3000
      - key: HOST
        value: 0.0.0.0
      - key: DASHSCOPE_BASE_URL
        value: https://dashscope.aliyuncs.com/compatible-mode/v1
      - key: DASHSCOPE_MODEL
        value: qwen-plus
      - key: DASHSCOPE_API_KEY
        sync: false
