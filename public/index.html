<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#c7cee6" />
    <title>Bloom Bond</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="stage">
      <section class="phone" id="loginPanel">
        <div class="phone-inner login-view">
          <div class="brand-mark" aria-hidden="true">
            <span class="brand-mark-bloom"></span>
            <span class="brand-mark-bond"></span>
          </div>
          <h1 class="logo">Bloom Bond</h1>
          <p class="tagline">Quietly bloom, gently bond.</p>
          <form id="loginForm" class="glass-card login-form">
            <label>
              用户名
              <input name="account" placeholder="请输入你的用户名" autocomplete="username" required />
            </label>
            <label>
              密码
              <input name="password" type="password" placeholder="请输入密码" autocomplete="current-password" required />
            </label>
            <button type="submit" class="gradient-btn">进入 Bloom Bond</button>
          </form>
        </div>
      </section>

      <section class="phone" id="chatPanel">
        <div class="phone-inner chat-view">
          <header class="topbar glass-card">
            <div class="avatar"></div>
            <div class="topbar-copy">
              <strong id="chatName">Bloom Bond</strong>
              <p id="chatSubtitle">尚未创建角色</p>
            </div>
            <button id="openProfileButton" class="menu-btn" type="button" aria-label="打开角色属性">
              <span></span><span></span><span></span>
            </button>
          </header>

          <p class="name-pair"><span id="youName">你</span> · <span id="roleName">Bloom Bond</span></p>
          <div id="messages" class="messages" aria-live="polite"></div>

          <form id="messageForm" class="composer glass-card">
            <textarea id="messageInput" rows="1" placeholder="想说点什么？" maxlength="1200"></textarea>
            <button type="submit" class="send-btn">发送</button>
          </form>

          <p id="chatHint" class="chat-hint" role="status" aria-live="polite"></p>
        </div>
      </section>

      <section class="phone" id="profilePanel">
        <div class="phone-inner profile-view">
          <header class="profile-header">
            <button id="backToChatButton" class="ghost-btn" type="button" aria-label="返回聊天">返回</button>
            <h2>角色属性</h2>
          </header>

          <form id="importForm" class="glass-card import-form">
            <label class="file-zone" for="profileFile">
              <input id="profileFile" name="profileFile" type="file" accept=".txt,.md,.markdown" />
              <span id="fileHint">上传 .txt / .md / .markdown，将人物资料填入属性表单。</span>
            </label>
            <button type="submit" class="secondary-btn">解析并填入</button>
          </form>

          <form id="characterForm" class="glass-card profile-form">
            <label>昵称<input name="nickname" required maxlength="32" placeholder="给 TA 取一个名字" /></label>
            <label>关系设定<input name="relationship" required maxlength="60" placeholder="你希望 TA 以什么身份陪你聊天" /></label>
            <label>年龄感<input name="ageSense" maxlength="40" placeholder="例如：20+ / 30 左右" /></label>
            <label>性格<input name="traits" required maxlength="120" placeholder="例如：克制、温柔、清醒、有边界感" /></label>
            <label>职业<input name="occupation" maxlength="80" placeholder="例如：创意总监 / 摄影师 / 研究员" /></label>
            <label>兴趣<input name="interests" maxlength="160" placeholder="例如：夜跑、爵士、看展、湖边散步" /></label>
            <label>说话风格<textarea name="speechStyle" required maxlength="160" placeholder="例如：自然口语、简洁、会接住情绪、不说教"></textarea></label>
            <label>关系背景<textarea name="background" maxlength="500" placeholder="你们怎么认识？TA 知道你哪些经历？"></textarea></label>
            <label>禁区 / 边界<textarea name="boundaries" maxlength="300" placeholder="例如：不越界、不施压、不危险引导"></textarea></label>
            <button type="submit" class="gradient-btn" id="createOrUpdateButton">创建角色并开始对话</button>
          </form>

          <button id="profileToChatButton" class="secondary-btn profile-to-chat" type="button">返回聊天</button>
          <article id="soulPreview" class="glass-card soul-preview"></article>
        </div>
      </section>
    </main>
    <script src="/app.js" type="module"></script>
  </body>
</html>
